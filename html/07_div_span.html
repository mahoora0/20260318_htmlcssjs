<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home"
    />
    <style>
      span {
        width: 300px;
        height: 100px;
        background-color: aqua;
        margin: 10px;
        /* span에서 mergin은 좌우는 적용 상하는 미적용  */
      }
      div {
        width: 300px;
        height: 100px;
        margin: 10px;
        background-color: brown;
      }
      table,
      td,
      th {
        width: 800px;
        height: 30px;

        border: 1px solid black;
        border-collapse: collapse;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <h1>미디어 관련 태그</h1>
    <a href="/">
      <span class="material-symbols-outlined"> home </span>
      Home
    </a>
    <hr />
    <span>Hello</span>
    <span>World</span>
    <div>1</div>
    <div>2</div>
    <table>
      <tr>
        <th>block 속성의 태그 :: 공간에 대한 영역</th>
        <th>inline 속성의 태그 :: 컨텐트에 대한 영역</th>
      </tr>
      <tr>
        <td>h1~h6, p, pre, blockquote, ul, ol, li, div, ...</td>
        <td>img, a, audio, video, span, ...</td>
      </tr>
    </table>
    <script></script>
  </body>
</html>
