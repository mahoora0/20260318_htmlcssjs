<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <style>
      table,
      td,
      th {
        width: 800px;
        height: 30px;

        border: 1px solid black;
        border-collapse: collapse;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <h1>미디어 관련 태그</h1>
    <a href="index.html">
      <span class="material-icons icon"> home </span>
      Home
    </a>
    <p>
      <span class="material-icons icon"> key </span>

      태그가 단순히 다큐먼트의 구조적 기능에만 국한 된 것이 아니라 태그를
      참조함에 있어서 의미를 부여할 수 있는 기능
    </p>
    <p>
      <span class="material-icons icon"> view_timeline</span>

      검색 엔진 기계 입장에서 콘텐츠를 더 쉽게 이해할 수 있게 하여 SEO
      (검색엔진최적화) 성능을 더욱 향상시킬 수 있다.
    </p>
    <hr />
    <!-- figure(이미지/그래프 묶음), figurecaption(설명) -->
    <figure>
      <img src="images/semantic.jpg" alt="semantic" />
      <figcaption>이미지 설명</figcaption>
    </figure>
    <!-- header(상단영역, 로고, 제목), nav(메뉴/링크 모음), main(핵심 콘텐츠), footer(하단 정보) -->
    <header>
      <h1>header</h1>
    </header>
    <nav>
      <ul>
        <li>Menu A</li>
        <li>Menu B</li>
        <li>Menu C</li>
      </ul>
    </nav>
    <main>
      <!-- section(주제별 구역), article(뉴스, 게시글, 개별적인 구역), aside(광고, 사이드바) -->
      <section>
        <article>
          <h3>Item 1</h3>
          <discription></discription>
        </article>
      </section>
      <aside>광고 영역</aside>
    </main>
    <footer>
      <!-- mark(강조), time(날짜, 시간), address(주소) -->
      <mark>저작권</mark>
      <time datetime="2026-03-19">오늘</time>
      <address>연락처</address>
    </footer>
    <script></script>
  </body>
</html>
