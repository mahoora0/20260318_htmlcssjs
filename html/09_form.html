<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <style>
      table,
      td,
      th {
        width: 800px;
        height: 30px;
        border: 1px solid black;
        border-collapse: collapse;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <h1>입력 양식 태그</h1>
    <a href="/">
      <span class="material-icons icon"> home </span>
      Home
    </a>
    <form action="index.html" method="post" enctype="multipart/form-data">
      <fieldset>
        <legend>입력 양식 태그 종류</legend>
        <div>
          <label for="no">번호</label>
          <input id="no" name="no" type="text" value="0001" readonly />
          <input type="hidden" name="key" value="ldirng" />
        </div>
        <div>
          <label for="subject">제목</label>
          <input
            id="subject"
            name="subject"
            type="text"
            required
            placeholder="제목을 입력"
          />
        </div>
        <div>
          <label for="password">비밀번호</label>
          <input
            type="password"
            name="pw"
            id="password"
            placeholder="비밀번호를 입력하세요"
          />
        </div>
        <div>
          <label for="female">여</label>
          <input id="female" type="radio" name="gender" value="여" checked />
          <label for="male">남</label>
          <input id="male" type="radio" name="gender" value="남" />
        </div>
        <div>
          <label for="chk_hobby">게임</label>
          <input
            type="checkbox"
            name="hobby"
            id="chk_hobby"
            value="게임"
            checked
          />
          <label for="chk_hobby_chess">체스</label>
          <input
            type="checkbox"
            name="hobby"
            id="chk_hobby_chess"
            value="체스"
          />
          <label for="chk_hobby_movie">영화</label>
          <input
            type="checkbox"
            name="hobby"
            id="chk_hobby_movie"
            value="영화"
          />
        </div>
        <div>
          <label for="email">E-mail</label>
          <input type="email" name="email" id="email" disabled />
        </div>
        <div>
          <label>
            모바일
            <select id="mobile" name="mobile">
              <option value="">선택하세요</option>
              <option value="010" selected>010</option>
              <option value="011">011</option>
            </select>
            <input type="text" name="mobile01" id="mobile01" maxlength="4" />
            -
            <input type="number" name="mobile02" id="mobile02" maxlength="4" />
          </label>
        </div>
        <div>
          <label for="bigo">비고</label>
          <textarea name="bigo" id="bigo" rows="6"></textarea>
        </div>
        <div>
          <label for="startday">시작일</label>
          <input type="date" name="startday" id="startday" />
          <input type="time" />
        </div>
        <div>
          <input type="button" value="작성 button" />
          <input type="submit" value="작성 submit" />
          <button type="button">Button</button>
          <button type="reset">Reset</button>
          <button type="submit">Submit</button>
        </div>
      </fieldset>
    </form>
    <input type="text" name="etc" id="etc" />
    <a
      href="https://github.com/LeeGu-hun/20260318_htmlcssjs/blob/main/08_semantic.html"
      >LeeGu-hun</a
    >
    <script></script>
  </body>
</html>
