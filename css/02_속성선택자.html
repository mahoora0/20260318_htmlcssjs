<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home"
    />
    <style>
      /* 1. 속성값과 완전 일치 */
      input[type="text"] {
        background-color: pink;
      }
      input[type="password"] {
        background-color: yellow;
      }
      input[type="text"],
      input[type="password"] {
        color: white;
      }
    </style>
  </head>

  <body>
    <h1>속성 선택자</h1>
    <a href="/">
      <span class="material-symbols-outlined">home</span>
      Home
    </a>
    <hr />
    <input type="text" name="title" id="" />
    <input type="text" name="subject" id="" />
    <input type="password" />
    <input type="button" value="" />

    <h4>data set을 활용한 속성 선택자</h4>

    <ol>
      <li data-role="one" data-email="one@abc.com">one@abc.com</li>
      <li data-role="one-two" data-email="one-two@abc.com">one-two@abc.com</li>
      <li data-role="one two" data-email="one two@abc.com">one two@abc.com</li>
      <li data-role="onetwo" data-email="onetwo@abc.com">onetwo@abc.com</li>
      <li data-role="zero one two" data-email="zero one two@abc.com">
        zero one two@abc.com
      </li>
      <li data-role="zero-one two" data-email="zero-one two@abc.com">
        zero-one two@abc.com
      </li>
      <li data-role="zero one-two" data-email="zero one-two@abc.com">
        zero one-two@abc.com
      </li>
      <li data-role="zero-one-two" data-email="zero-one-two@abc.com">
        zero-one-two@abc.com
      </li>
    </ol>
    <script></script>
  </body>
</html>
