<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home"
    />
    <style>
      #choice:checked ~ input[type="text"] {
        background-color: brown;
      }
      #name:focus {
        background-color: pink;
      }
      #view:checked ~ label {
        display: none;
      }
    </style>
  </head>

  <body>
    <h1>반응 선택자</h1>
    <p>checked, focus, disabled</p>
    <a href="/">
      <span class="material-symbols-outlined">home</span>
      Home
    </a>
    <hr />
    <div>
      <label for="choice">checked 선택</label>
      <input id="choice" type="checkbox" value="여" />
      <input type="text" />
    </div>
    <input type="text" name="name" id="name" />
    <div>
      <label for="view">선택 후 disabled</label>
      <input id="view" type="checkbox" />
      <label id="notice">notice</label>
    </div>

    <script></script>
  </body>
</html>
