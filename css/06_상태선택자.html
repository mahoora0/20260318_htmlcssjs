<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home"
    />
    <style>
      #choice:checked ~ input[type="text"] {
        background-color: brown;
      }
      #name:focus {
        background-color: pink;
      }

      #notice:disabled ~ #result {
        color: red;
      }
    </style>
  </head>

  <body>
    <h1>반응 선택자</h1>
    <p>checked, focus, disabled</p>
    <a href="/">
      <span class="material-symbols-outlined">home</span>
      Home
    </a>
    <hr />
    <div>
      <label for="choice">checked 선택</label>
      <input id="choice" type="checkbox" value="여" />
      <input type="text" />
    </div>
    <input type="text" name="name" id="name" />
    <div>
      <label for="view">선택 후 disabled</label>
      <input id="view" type="checkbox" onclick="disableText()" />
      <label>notice</label>
      <input type="text" name="notice" id="notice" />
      <label id="result">경고</label>
    </div>

    <script>
      function disableText() {
        const noti = document.querySelector("#notice");
        console.dir(noti);
        // noti.disabled = !noti.disabled; //#notice의 현재 disabled에 !를 연산

        console.log(noti.disabled);
        if (noti.disabled === true) {
          noti.disabled = false;
        } else {
          noti.disabled = true;
        }
      }
    </script>
  </body>
</html>
