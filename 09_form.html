<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <style>
      table,
      td,
      th {
        width: 800px;
        height: 30px;
        border: 1px solid black;
        border-collapse: collapse;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <h1>입력 양식 태그</h1>
    <a href="index.html">
      <span class="material-icons icon"> home </span>
      Home
    </a>
    <form action="index.html" method="get">
      <fieldset>
        <legend>입력 양식 태그 종류</legend>
        <div>
          <label for="subject">제목</label>
          <input id="subject" name="subject" type="text" />
        </div>
        <div>
          <label for="password">비밀번호</label>
          <input type="password" name="pw" id="password" />
        </div>
        <div>
          <label for="female">여</label>
          <input id="female" type="radio" name="gender" value="여" />
          <label for="male">남</label>
          <input id="male" type="radio" name="gender" value="남" />
        </div>
        <div>
          <input type="button" value="작성 button" />
          <input type="submit" value="작성 submit" />
        </div>
      </fieldset>
    </form>
    <a
      href="https://github.com/LeeGu-hun/20260318_htmlcssjs/blob/main/08_semantic.html"
      >LeeGu-hun</a
    >
    <script></script>
  </body>
</html>
